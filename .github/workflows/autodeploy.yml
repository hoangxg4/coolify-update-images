name: Coolify Auto-Update Check
on:
  schedule:
    - cron: '0 * * * *' # Chạy tự động mỗi giờ (phút 0)
  workflow_dispatch:      # Cho phép bấm nút chạy thủ công

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Quyền bắt buộc để ghi file apps_state.json

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Masking Secrets
        run: |
          echo "::add-mask::${{ secrets.COOLIFY_URL }}"
          echo "::add-mask::${{ secrets.COOLIFY_TOKEN }}"

      - name: Install regctl
        run: |
          curl -L -s https://github.com/regclient/regclient/releases/latest/download/regctl-linux-amd64 > regctl
          chmod +x regctl
          sudo mv regctl /usr/local/bin/

      - name: Run Update Script
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          REGISTRIES_CONF: ${{ secrets.REGISTRIES_CONF }}
        run: bash check_and_deploy.sh

      - name: Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Chỉ commit nếu có sự thay đổi trong file state
          if [[ -n $(git status --porcelain apps_state.json) ]]; then
            git add apps_state.json
            git commit -m "chore: update image digests [skip ci]"
            git pull --rebase origin main
            git push -q
          else
            echo "No changes in image digests. Skipping push."
          fi
